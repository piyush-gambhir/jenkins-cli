name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # For cross-repo homebrew tap push, use a PAT token stored as GH_PAT
          # instead of GITHUB_TOKEN. Create a fine-grained PAT with contents:write
          # permission on the homebrew-tap repo and add it as a repository secret.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
