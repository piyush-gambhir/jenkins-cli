version: 2

project_name: jenkins-cli

builds:
  - binary: jenkins
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/piyush-gambhir/jenkins-cli/internal/version.Version={{.Version}} -X github.com/piyush-gambhir/jenkins-cli/internal/version.Commit={{.Commit}} -X github.com/piyush-gambhir/jenkins-cli/internal/version.BuildTime={{.Date}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

